# Statisches Hosting der Website (Ordner public/) – kein Build nötig.
[build]
  publish = "public"

# Saubere URLs & Basis-Sicherheitsheader
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
